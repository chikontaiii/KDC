<!DOCTYPE html>
<html lang="ru" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Контакты | KDC</title>
    <link rel="icon" type="image/jpg" href="photo/KDC.JPG">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body data-page="contacts">
    <section class="section-padding" style="padding-top:120px;">
        <div class="container">
            <h1 class="section-title">Контакты</h1>
            <div class="contact-grid reveal">
                <div class="glass-card contact-form">
                    <h3 style="font-size:1.8rem; margin-bottom:15px; text-transform:uppercase;">Напишите нам</h3>
                    <input type="text" placeholder="Ваше имя">
                    <input type="email" placeholder="Email">
                    <textarea rows="5" placeholder="Сообщение"></textarea>
                    <button class="btn btn-primary">Отправить</button>
                </div>
                <div class="glass-card contact-info">
                    <h3 style="font-size:1.8rem; margin-bottom:15px; text-transform:uppercase;">Связаться</h3>
                    <p><i class="fa-solid fa-envelope"></i> kyrgyzdrift.cup@gmail.com </p>
                    <p><i class="fa-solid fa-phone"></i> +996 555 034 043</p>
                    <p><i class="fa-solid fa-location-dot"></i> Бишкек, автодром «Ганси»</p>
                    <div style="margin-top:20px; display:flex; gap:10px;">
                        <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="social-icon"><i class="fa-brands fa-youtube"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <script src="js/main.js"></script>
</body>

</html>
